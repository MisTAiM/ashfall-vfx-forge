const allFx=Object.values(FX).flat();const findFx=id=>allFx.find(f=>f.id===id);

return(<div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
<div className="hdr"><div><div className="ttl">ASHFALL VFX FORGE</div><div className="sub">v3.3 — 44 Effects · Particle Editor · Attack Anims</div></div>
<div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
<label className="ab" style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer'}}><input type="file" accept="image/*" onChange={handleUpload} style={{display:'none'}}/><Ic name="upload" size={12}/> Upload</label>
<button className="abp" onClick={()=>setPlaying(!playing)}><Ic name={playing?'pause':'play'} color="#fff" size={12}/></button>
<button className="ab" onClick={dlFrame}><Ic name="download" size={12}/></button>
<button className="ab" onClick={()=>setShowCode(!showCode)}><Ic name="code" size={12}/></button>
</div></div>
<div className="main">
<div className="side"><div className="tabs">{['effects','attacks','items','presets'].map(t2=><button key={t2} className={'tb'+(tab===t2?' a':'')} onClick={()=>setTab(t2)}>{t2}</button>)}</div>
{(tab==='effects'||tab==='attacks')&&<div style={{paddingBottom:8}}>{Object.entries(FX).filter(([cat])=>tab==='attacks'?cat==='Attacks'||cat==='Combat':cat!=='Attacks'&&cat!=='Combat').map(([cat,fxs])=><div key={cat}><div className="cl">{cat}</div>{fxs.map(f=>{const isA=f.id.startsWith('atk_');return <div key={f.id} style={{display:'flex',alignItems:'center'}}><button className={'fb'+(fx.includes(f.id)?' a':'')} onClick={()=>!isA&&togFx(f.id)}><div className="fi"><Ic name={f.ic} color={f.c}/></div><div style={{flex:1}}><div className="fn">{f.n}</div><div className="fdd">{f.d}</div></div>{!isA&&<div className={'fd'+(fx.includes(f.id)?' a':'')}/>}</button>{isA&&<button className="fir" onClick={()=>{if(!fx.includes(f.id))togFx(f.id);fireAttack(f.id)}}>FIRE</button>}</div>})}</div>)}</div>}
{tab==='items'&&<div style={{padding:5}}>{Object.entries(ITEMS).map(([cat,items])=><div key={cat}><div className="cl">{cat}</div>{items.map(it=><button key={it.id} className={'ib'+(selItem?.id===it.id?' a':'')} onClick={()=>setSel(it)}><div style={{display:'flex',justifyContent:'space-between',width:'100%'}}><span>{it.n}</span><span className="tb2" style={{background:TCC[it.t]+'22',color:TCC[it.t]}}>{it.t}</span></div><div style={{fontSize:8,color:'var(--txt3)'}}>{it.s} · <span style={{color:ELC[it.e]||'#888'}}>{it.e}</span></div></button>)}</div>)}</div>}
{tab==='presets'&&<div style={{padding:5}}>{PRESETS.map((pr,i)=><button key={i} className="pb" style={{borderColor:TCC[pr.t]+'33'}} onClick={()=>setFx([...pr.fx])}><div style={{fontFamily:'var(--font-head)',fontWeight:700,fontSize:13,color:TCC[pr.t]}}>{pr.n}</div><div style={{fontSize:9,color:'var(--txt3)'}}>{pr.fx.join(' + ')}</div></button>)}</div>}
</div>
<div className="cw" onClick={handleCanvasClick}><canvas ref={cvRef} style={{width:'100%',height:'100%',display:'block'}}/>
<a href="wiki.html" target="_blank" style={{position:'absolute',top:6,right:6,zIndex:5,padding:'3px 8px',background:'rgba(0,0,0,0.6)',border:'1px solid var(--bdr)',borderRadius:3,color:'var(--txt2)',fontSize:9,textDecoration:'none'}}><Ic name="doc" size={10}/> Wiki</a>
<div className="ch">{fx.map(eid=>{const f=findFx(eid);return f?<span key={eid} className="cp2" onClick={()=>togFx(eid)}><Ic name={f.ic} color={f.c} size={10}/>{f.n}<span style={{opacity:.4}}>x</span></span>:null})}</div>
{selItem&&<div style={{position:'absolute',bottom:6,left:6,padding:'4px 10px',background:'rgba(0,0,0,0.8)',borderRadius:3,zIndex:2}}><span style={{color:TCC[selItem.t],fontWeight:700,fontSize:11,fontFamily:'var(--font-head)'}}>{selItem.n}</span></div>}
<div style={{position:'absolute',bottom:6,right:6,display:'flex',gap:3,zIndex:2}}>{FX['Attacks'].map(a=><button key={a.id} className="ai2" title={a.n} onClick={e=>{e.stopPropagation();if(!fx.includes(a.id))togFx(a.id);fireAttack(a.id)}}><Ic name={a.ic} color="#ff8c42"/></button>)}</div>
{showCode&&<div className="co"><div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:'var(--acc)',fontFamily:'var(--font-head)',fontWeight:700,fontSize:14}}>Generated Code</span><div style={{display:'flex',gap:4}}><button className="abp" onClick={copyCode}>{copied?'Copied!':'Copy'}</button><button className="ab" onClick={()=>setShowCode(false)}>Close</button></div></div><pre className="cdb">{genCode()}</pre></div>}
</div>
<div className="pan">
<div className="cl">Global</div>
<SL l="Intensity" k="intensity" mn={.1} mx={3} st={.1} sf="x"/>
<SL l="Speed" k="speed" mn={.1} mx={4} st={.1} sf="x"/>
<SL l="VFX Scale" k="vfxScale" mn={.3} mx={3} st={.05} sf="x"/>
<div className="sd"/>
<div className="cl">Particle Editor</div>
<div className="sr"><div className="sh2"><span className="sl2">Shape</span></div><select value={cfg.pShape} onChange={e=>upCfg('pShape',e.target.value)}>{SHAPES.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
<SL l="Emit Angle" k="pAngle" mn={0} mx={360} st={5} sf="deg"/>
<SL l="Spread" k="pSpread" mn={0} mx={360} st={5} sf="deg"/>
<SL l="Size" k="pSize" mn={1} mx={12} st={.5} sf="px"/>
<SL l="Size Min" k="pSizeMin" mn={.5} mx={10} st={.5}/>
<SL l="Size Max" k="pSizeMax" mn={1} mx={20} st={.5}/>

<SL l="Speed" k="pSpeed" mn={.1} mx={4} st={.1} sf="x"/>
<SL l="Speed Min" k="pSpdMin" mn={.1} mx={5} st={.1}/>
<SL l="Speed Max" k="pSpdMax" mn={.5} mx={10} st={.1}/>

<SL l="Lifetime" k="pLife" mn={.2} mx={5} st={.1} sf="s"/>
<SL l="Blur" k="pBlur" mn={0} mx={8} st={.5} sf="px"/>
<SL l="Glow" k="pGlow" mn={0} mx={30} st={1} sf="px"/>
<SL l="Gravity" k="pGrav" mn={-1} mx={1} st={.01}/>
<SL l="Grav Direction" k="pGravDir" mn={0} mx={360} st={5} sf="deg"/>
<SL l="Drag" k="pDrag" mn={.8} mx={1} st={.005}/>
<SL l="Rotation Speed" k="pRotSpd" mn={0} mx={1} st={.02}/>
<SL l="Trails" k="pTrail" mn={0} mx={20} st={1}/>
<SL l="Turbulence" k="pTurb" mn={0} mx={2} st={.05}/>
<SL l="Emission Rate" k="pRate" mn={1} mx={8} st={1} sf="/f"/>
<SL l="Amount Multi" k="pAmount" mn={.1} mx={5} st={.1} sf="x"/>
<SL l="Max Particles" k="pMaxP" mn={50} mx={2000} st={50}/>

<SL l="Spawn Radius" k="pSpawnR" mn={5} mx={100} st={5} sf="px"/>
<SL l="Size Variance" k="pSizeVar" mn={0} mx={1} st={.05}/>
<SL l="Opacity" k="pOpacity" mn={.1} mx={1} st={.05}/>
<SL l="Fade Point" k="pFade" mn={.05} mx={.9} st={.05}/>
<SL l="Stretch" k="pStretch" mn={0} mx={2} st={.1}/>
<SL l="Flicker" k="pFlicker" mn={0} mx={1} st={.05}/>
<SL l="Distortion" k="pDistort" mn={0} mx={2} st={.1}/>
<div className="sd"/>
<div className="cl">Forces</div>
<SL l="Wind X" k="pWindX" mn={-3} mx={3} st={.1}/>
<SL l="Wind Y" k="pWindY" mn={-3} mx={3} st={.1}/>
<SL l="Attract/Repel" k="pAttract" mn={-2} mx={2} st={.05}/>
<SL l="Pulse" k="pPulse" mn={0} mx={3} st={.1}/>
<SL l="Color Random" k="pColRand" mn={0} mx={1} st={.05}/>
<div className="sr"><div className="sh2"><span className="sl2">Spawn Shape</span></div><select value={cfg.pSpawnShape} onChange={e=>upCfg('pSpawnShape',e.target.value)}>{SPAWNS.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
{(cfg.pSpawnShape==="line"||cfg.pSpawnShape==="square")&&<>
<SL l="Spawn Width" k="pSpawnW" mn={10} mx={200} st={5} sf="px"/>
<SL l="Spawn Height" k="pSpawnH" mn={10} mx={200} st={5} sf="px"/>
</>}
<div className="cr2"><label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",color:"var(--txt2)",fontSize:10}}><input type="checkbox" checked={cfg.pShrink} onChange={e=>upCfg('pShrink',e.target.checked)}/> Shrink over lifetime</label></div>

<div className="sr"><div className="sh2"><span className="sl2">Blend Mode</span></div><select value={cfg.pComp} onChange={e=>upCfg('pComp',e.target.value)}>{COMPS.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
<div className="sr"><div className="sh2"><span className="sl2">End Color</span></div><div className="cr2"><input type="color" value={cfg.pColEnd||cfg.partCol} onChange={e=>upCfg('pColEnd',e.target.value)} style={{width:22,height:18}}/><span className="cll">Gradient end</span><button className="ab" style={{padding:"2px 6px",fontSize:9}} onClick={()=>upCfg('pColEnd','')}>Off</button></div></div>
<div className="cr2"><label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",color:"var(--txt2)",fontSize:10}}><input type="checkbox" checked={cfg.pBounce} onChange={e=>upCfg('pBounce',e.target.checked)}/> Bounce off edges</label></div>

<div style={{fontSize:9,color:'var(--txt3)',margin:'4px 0 8px',display:'flex',alignItems:'center',gap:4}}><Ic name="crosshair" color="var(--acc)" size={12}/> Click canvas to place emitter</div>
<div className="sd"/>
<div className="cl">Colors</div>
<CP l="Particles" k="partCol"/><CP l="Aura" k="auraCol"/><CP l="Background" k="bg"/>
{fx.some(e=>e.startsWith('atk_')||e.startsWith('cb_'))&&<><div className="cl">Combat</div><CP l="Attack" k="atkColor"/><CP l="Heal" k="healColor"/><SL l="Dmg Min" k="atkDmgMin" mn={1} mx={100} st={1}/><SL l="Dmg Max" k="atkDmgMax" mn={1} mx={999} st={1}/><SL l="Shake" k="shakeStr" mn={1} mx={20} st={1}/></>}
{fx.some(e=>['radial_glow','flame_aura','frost_aura','shadow_aura','lightning_aura','holy_aura'].includes(e))&&<SL l="Aura Radius" k="auraSz" mn={10} mx={80} st={1} sf="px"/>}
{fx.includes('float_bob')&&<SL l="Float" k="floatR" mn={5} mx={60} st={1} sf="px"/>}
{fx.includes('spin')&&<SL l="Spin Speed" k="spinSpd" mn={.1} mx={5} st={.1} sf="x"/>}
{fx.includes('pulse_scale')&&<SL l="Pulse" k="pulseR" mn={.02} mx={.5} st={.01}/>}
{fx.includes('wobble')&&<SL l="Wobble" k="wobbleR" mn={2} mx={30} st={1} sf="px"/>}
{fx.includes('bounce')&&<SL l="Bounce" k="bounceH" mn={5} mx={80} st={1} sf="px"/>}
{fx.includes('orbit')&&<SL l="Orbit" k="orbitR" mn={20} mx={150} st={5} sf="px"/>}
{fx.includes('bloom')&&<SL l="Bloom" k="bloomStr" mn={.1} mx={1.5} st={.05}/>}
{fx.includes('chromatic')&&<SL l="Chromatic" k="chromOff" mn={1} mx={12} st={.5} sf="px"/>}
{fx.includes('scanlines')&&<SL l="Scan Gap" k="scanGap" mn={2} mx={8} st={1} sf="px"/>}
{fx.includes('vignette')&&<SL l="Vignette" k="vigStr" mn={.1} mx={.8} st={.05}/>}
{fx.includes('color_grade')&&<><SL l="Hue" k="hue" mn={0} mx={360} st={5} sf="deg"/><SL l="Sat" k="sat" mn={0} mx={300} st={5} sf="%"/><SL l="Bright" k="bright" mn={20} mx={200} st={5} sf="%"/></>}
<div className="sd"/>
<div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
<button className="ab" onClick={()=>setFx([])}>Clear</button>
<button className="ab" onClick={()=>setFx(allFx.map(f=>f.id))}>All</button>
<button className="ab" onClick={fireBurst}>Burst</button>
<button className="ab" onClick={()=>{pts.current=[]}}>Kill P</button>
<button className="ab" onClick={()=>setCfg(p=>({...p,intensity:1,speed:1,vfxScale:1,partCol:'#ff6b35',auraCol:'#ff6b35',bg:'#0f0509',pShape:'circle',pAngle:270,pSpread:120,pBlur:0,pSize:3,pLife:1.5,pSpeed:1,emX:.5,emY:.5}))}>Reset</button>
</div>
<div className="ib2"><span style={{color:'var(--acc)',fontFamily:'var(--font-head)',fontWeight:700}}>VFX FORGE v3.3</span><br/>44 FX · 9 Shapes · 35+ Particle Controls<br/>Density · Wind · Attract · Burst · Spawn Shapes<br/>Trails · Glow · Pulse · Blend Modes · Color Gradient</div>
</div></div></div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
